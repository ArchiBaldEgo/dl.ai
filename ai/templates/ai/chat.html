<!doctype html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel='stylesheet' href="/ai/assets/admin/css/chat_template.css"/>
    <script src="/ai/assets/admin/js/chat_template.js" defer></script>
    <title>DLAPI</title>
</head>

<body>
    <div id="content">
        <div class="line-panel">
                    <div>
                        <select id="selectLang">
                            <option language="Russian">Русский</option>
                            <option language="English">English</option>
                            <option language="French">Français</option>
                        </select>
                        <select id="select">
                            {% if available_models %}
                                {% for model in available_models %}
                                    <option value="{{ model.key }}">{{ model.title }}</option>
                                {% endfor %}
                            {% else %}
                                <option value="" selected disabled>Сегодня нет доступных моделей</option>
                            {% endif %}
                        </select>
                        <select id="selectType"
                            onchange="goToAiPage(this)">
                            <option data-link="/ai/chat/" selected>Чат с DLAI</option>
                            <option data-link="/ai/solve-problem/">Реши задачу</option>
                            <option data-link="/ai/find-error/">В чём ошибка?</option>
                        </select>
                        
                    </div>
                    <!-- Кнопка голосового режима -->
                    <div class="voice-mod-div">
                        <button type="button" class="voice-mode-btn" onclick="toggleVoiceControls()">
                            Голосовой режим
                        </button>
                        <div class="voice-status" id="voiceStatus"></div>
                    </div>
                    <!-- Голосовые контролы (скрыты по умолчанию) -->
                    <div class="voice-controls" id="voiceControls">
                        <button type="button" class="voice-btn" id="voiceInputBtn" onclick="toggleVoiceInput()">
                            <span class="voice-input-indicator" id="voiceIndicator"></span>
                            Голосовой ввод
                        </button>
                        <button type="button" class="voice-btn" id="voiceOutputBtn" onclick="speakLastResponse()">
                            Озвучить ответ
                        </button>
                        <button type="button" class="voice-btn" onclick="stopSpeech()">
                            Стоп
                        </button>
                        
                        <!-- Чекбокс для think-тегов -->
                        <div class="think-checkbox">
                            <input type="checkbox" id="speakThinkContent" checked>
                            <label for="speakThinkContent">Озвучивать think-блоки</label>
                        </div>
                        
                    </div>
                    <div class="panel-date">11.03.2026</div>
        </div>
        <hr/>  
        <div class="blo">
              
            <ul id='messages'>
            </ul>
            <div class="dv">
                <div class="resize-button" onmousedown="startResize(event)">🠔 </div>
                <form action="" onsubmit="sendMessage(event)">
                    <textarea type="text" id="messageText"
                        placeholder="Задайте вопрос (желательно на английском во избежание ошибок), для красивого форматирования оберните код в ```(буква Ё на клавиатуре)"
                        autocomplete="off"></textarea>
                    <div class="buttons-block">
                        <button type="submit">Send</button>
                        <button type="button" onclick="clearContext()">Clear Context</button>
                        <!-- <div class="check">
                            <input type="checkbox" class="inp" checked> <div class="check-text"></div>
                        </div> -->
                    </div> 
                </form>
            </div>
        </div>

        <div class="sidebar">
            <a href="/ai/admin/login/?next=/ai/admin/" style="text-decoration: none; color: black;">
                <div class="sidebar-header" id="adminPanelLink">
                    Админ-Панель
                </div>
            </a>
            <div class="sidebar-content" style="display: flex; flex-direction: column; gap: 8px;">
                <a href="/ai/test-panel/login/?next=/ai/admin/arm/find-error/&back={{ request.get_full_path|urlencode }}" id="testPanelLink" style="text-decoration: none; color: black; border: 1px solid #ddd; border-radius: 6px; padding: 10px 12px;">
                    Тест-панель
                </a>
            </div>
        </div>

        <button class="toggle-button" type="button" aria-label="Open menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6" />
            </svg>
        </button>
    </div>
</body>
<script>
function goToAiPage(selectEl) {
    const selected = selectEl.querySelector('option:checked');
    const target = selected && selected.dataset ? selected.dataset.link : '';
    if (!target) {
        return;
    }

    const query = window.location.search || '';
    const destination = query ? `${target}${query}` : target;
    window.location.href = destination;
}
</script>
</html>
