<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password - DLAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .username {
            margin-bottom: 20px;
            color: #444;
            font-size: 14px;
        }
        .username code {
            background: #f2f4f8;
            padding: 3px 6px;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 4px solid #c33;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        button:active {
            background: #4557c0;
        }
        .hints {
            color: #666;
            font-size: 12px;
            margin-top: 15px;
            line-height: 1.6;
        }
        .hints strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Set Password</h1>
        <p class="subtitle">Create your password to access the admin panel</p>

        {% if error_message %}
            <div class="error-message">{{ error_message }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next_url }}">
            {% if username %}
                <div class="username">Account: <code>{{ username }}</code></div>
            {% endif %}

            <div class="form-group">
                <label for="new_password">New Password:</label>
                <input type="password" id="new_password" name="new_password" required placeholder="At least 8 characters">
            </div>

            <div class="form-group">
                <label for="new_password_confirm">Confirm Password:</label>
                <input type="password" id="new_password_confirm" name="new_password_confirm" required placeholder="Confirm your password">
            </div>

            <button type="submit">Set Password</button>

            <div class="hints">
                <strong>Password requirements:</strong><br>
                • At least 8 characters<br>
                • Can contain letters, numbers, symbols
            </div>
        </form>
    </div>
</body>
</html>
