services:
  web:
    ports: []
    volumes:
      - static_volume:/app/static

  nginx:
    ports:
      # Prod runs behind existing https://dl.gsu.by reverse-proxy.
      # Bind to unprivileged port (>1024) so it works without sudo and
      # doesn't conflict with the main site that already owns 80/443.
      # Override via env: AI_NGINX_BIND=0.0.0.0 AI_NGINX_PORT=8080
      - "${AI_NGINX_BIND:-127.0.0.1}:${AI_NGINX_PORT:-8081}:80"
