# Example external nginx config for dl.gsu.by -> docker AI stack on 127.0.0.1:8081
#
# Place these location blocks inside the existing server { ... } for dl.gsu.by.
# Order matters: static -> websocket -> generic /ai/.

location ^~ /ai/static/ {
    proxy_pass http://127.0.0.1:8081/ai/static/;
    proxy_http_version 1.1;

    proxy_set_header Host 127.0.0.1;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Avoid corrupted static responses when intermediate proxies alter compression.
    proxy_set_header Accept-Encoding "";
    proxy_redirect off;
}

location /ai/chat/ws/ {
    proxy_pass http://127.0.0.1:8081/ai/chat/ws/;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location /ai/ {
    proxy_pass http://127.0.0.1:8081/ai/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
