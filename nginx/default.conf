upstream django_upstream {
    server web:8000;
}

# Preserve X-Forwarded-Proto from an outer reverse-proxy (dl.gsu.by).
# If absent (direct access), fall back to the local scheme.
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    location /ai/static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # App is mounted under /ai/ (same domain as the main site).
    location /ai/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Prevent accidental exposure of unrelated paths if this container is reached directly.
    location / {
        return 404;
    }
}
