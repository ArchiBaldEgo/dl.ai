upstream django_upstream {
    server web:8000;
    keepalive 32;
}

# Preserve X-Forwarded-Proto from an outer reverse-proxy (dl.gsu.by).
# If absent (direct access), fall back to the local scheme.
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    location /ai/static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # WebSocket endpoint should have long read timeout and upgrade headers.
    location /ai/chat/ws/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 3600s;
    }

    # App is mounted under /ai/ (same domain as the main site).
    location /ai/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        proxy_connect_timeout 30s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # Prevent accidental exposure of unrelated paths if this container is reached directly.
    location / {
        return 404;
    }
}
