services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Keep apt/pip on direct connection (HTTP_PROXY/HTTPS_PROXY are empty in .env).
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,db,nginx,.local}"
        # Puppeteer Chromium download needs the real corporate proxy.
        NPM_HTTP_PROXY: "${RUNTIME_HTTP_PROXY:-}"
        NPM_HTTPS_PROXY: "${RUNTIME_HTTPS_PROXY:-}"
    container_name: dl_ai_web
    restart: unless-stopped
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - bot_node_modules:/app/bot/node_modules
#      - bot_puppeteer_cache:/app/bot/.puppeteer-cache
    ports:
      - "8000:8000"
      - "${PORT:-3000}:3000"
    env_file:
      - .env
      - ./bot/.env
    environment:
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,db,nginx,.local}"
      # Puppeteer proxy vars already live in .env; map them to the names bot/worker/bot.js reads.
      BOT_PROXY: "${PUPPETEER_PROXY_SERVER:-}"
      BOT_PROXY_USER: "${PUPPETEER_PROXY_USERNAME:-}"
      BOT_PROXY_PASS: "${PUPPETEER_PROXY_PASSWORD:-}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null && python3 -c \"import urllib.request,json,sys; d=json.load(urllib.request.urlopen('http://localhost:3000/health', timeout=5)); sys.exit(0 if d.get('ok') and d.get('ready_count',0) > 0 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    depends_on:
      - db
    networks:
      - shared-network

  db:
    image: postgres:14
    container_name: dl_ai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "${DB_USER:-dlaibd}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-dlaibd}"
      POSTGRES_DB: "${DB_NAME:-dl_ai}"
    networks:
      - shared-network

  nginx:
    image: nginx:latest
    container_name: dl_ai_nginx
    restart: unless-stopped
    ports:
      - "${AI_NGINX_BIND:-0.0.0.0}:${AI_NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - static_volume:/app/staticfiles
    depends_on:
      - web
    networks:
      - shared-network


volumes:
  postgres_data:
    name: "${POSTGRES_VOLUME_NAME:-dlai_postgres_data}"
  static_volume:
  bot_node_modules:
  bot_puppeteer_cache:


networks:
  shared-network:
    name: "${DOCKER_NETWORK_NAME:-dlai-network}"
