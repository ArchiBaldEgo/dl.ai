services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,db,nginx,.local}"
    container_name: dl_ai_web
    command: daphne -b 0.0.0.0 -p 8000 DjangoTest.asgi:application
    restart: unless-stopped
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,db,nginx,.local}"
    depends_on:
      - db
    networks:
      - shared-network

  db:
    image: postgres:14
    container_name: dl_ai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "${DB_USER:-dlaibd}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-dlaibd}"
      POSTGRES_DB: "${DB_NAME:-dl_ai}"
    networks:
      - shared-network

  nginx:
    image: nginx:latest
    container_name: dl_ai_nginx
    restart: unless-stopped
    ports:
      - "${AI_NGINX_BIND:-0.0.0.0}:${AI_NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - static_volume:/app/staticfiles
    depends_on:
      - web
    networks:
      - shared-network

volumes:
  postgres_data:
    name: "${POSTGRES_VOLUME_NAME:-dlai_postgres_data}"
  static_volume:


networks:
  shared-network:
    name: "${DOCKER_NETWORK_NAME:-dlai-network}"
